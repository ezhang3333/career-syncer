name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels:
  - type: enhancement
  - status: needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should be built?
      placeholder: Add...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be done?
      placeholder: |
        - [ ] User can...
        - [ ] Error state handles...
        - [ ] Tests pass...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes for agent
      description: Any files, functions, designs, or constraints?
      placeholder: Start by checking...